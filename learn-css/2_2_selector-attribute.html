<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector Attribute</title>
    <style>
      /*속성이 존재하는 요소*/
      h2[class] {
        font-size: 50px;
      }
      a[target] {
        color: green;
      }
      /* 
      속성 값과 일치하는 요소
      일치하는 것은 =
      */
      h2[class='naver-title'] {
        color: green;
      }
      /*
      속성 값을 포함하는 요소
      포함하는 것은 *= 
      */
      a[href*='www'] {
        text-decoration: none;
      }
      /* 속성 값으로 시작하는 요소 */
      h2[class^='google'] {
        color: blue;
      }
      /* 속성 값으로 끝나는 요소 */
      a[href$='facebook.com'] {
        color: red;
      }
      /* 
      속성에 단어가 포함하는 요소
      단어가 있는지 없는지를 확인 */
      h2[class~='title'] {
        color: blue;
        font-weight: 300;
      }
    </style>
  </head>
  <body>
    <h2 class="naver-title">네이버</h2>
    <a href="http://www.naver.com">네이버</a>
    <h2 class="google-title">구글</h2>
    <a href="http://www.google.com" target="_blank">구글</a>
    <!--target="_blank"하면 새로운 창에서 열림-->
    <h2 class="facebook">페이스북</h2>
    <a href="http://www.facebook.com">페이스북</a>
    <h2>짐코딩</h2>
    <h2 class="text title gymcoding">감사합니다</h2>
  </body>
</html>
