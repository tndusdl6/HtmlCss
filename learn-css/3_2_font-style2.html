<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Style2</title>
    <style>
      html {
        font-size: 16px;
      }
      .content {
        border: 1px solid blue;
      }
      .text-center {
        text-align: center;
      }
      .text-right {
        text-align: right;
      }
      .text-left {
        text-align: left;
      }
      .article {
        line-height: 1.8rem;
        letter-spacing: 2px;
        word-spacing: 10px;
        text-indent: 80px;
      }
      .transform-case {
        text-transform: lowercase;
      }
      .article > a {
        text-decoration: none;
      }
      .text-shadow {
        text-shadow: 10px 5px 3px black;
      }
      ul {
        list-style: circle;
      }
    </style>
  </head>
  <body>
    <section>
      <p class="content text-center">gymcoding</p>
      <p class="content text-right">gymcoding</p>
      <p class="content text-left">gymcoding</p>
    </section>
    <section>
      <p class="article">
        이유는(<span class="transform-case">Korean</span>) 다양하지만 결국
        <a href="#">비만</a>의 원인은 평생을 쌓아온 생활 습관 때문이고, 그것이
        쌓이고 쌓여 현재의 체중을 만든 것이다. 이걸 단기간에 조금 덜 먹는 것으로
        빼봤자 인체의 항상성 때문에 조금만 방심하면 금방 살이 다시 찌니,
        말그대로 평생의 꾸준함을 요한다. 이 꾸준함이야 말로 다이어트가 어려운
        근본적인 이유이다.
      </p>
    </section>
    <section>
      <h2 class="text-shadow">짐코딩 유튜브 채널</h2>
    </section>
    <section>
      <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
      </ul>
    </section>
  </body>
</html>
